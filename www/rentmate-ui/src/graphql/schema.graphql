enum MessageType {
  MESSAGE
  INTERNAL
  APPROVAL
  SUGGESTION
  CONTEXT
  THREAD
  DRAFT_AI_REPLY
  ACTION
}

type Mutation {
  login(input: LoginInput!): AuthPayload!

  """Delete a tenant and all their leases (cascade)"""
  deleteTenant(uid: String!): Boolean!

  """Create a new task"""
  createTask(input: CreateTaskInput!): TaskType!

  """Transition task_status (e.g. suggested→active, active→resolved)"""
  updateTaskStatus(uid: Int!, status: TaskStatus!): TaskType!

  """Set the manager-authored goal (intent) for a task"""
  updateTaskGoal(uid: Int!, goal: String!): TaskType!

  """Tag a document to a property, unit, or tenant"""
  addDocumentTag(input: AddDocumentTagInput!): DocumentTagType!

  """Add a message to any conversation"""
  sendMessage(input: SendMessageInput!): ChatMessageType!

  """Send a message to a vendor via their notification channel (SMS)"""
  sendSms(vendorId: String!, body: String!, taskId: Int = null): ChatMessageType!

  """Permanently delete a task and all its messages"""
  deleteTask(uid: Int!): Boolean!

  """Update task mode and/or status"""
  updateTask(input: UpdateTaskInput!): TaskType!

  """Update the ordered progress steps for a task"""
  updateTaskSteps(uid: Int!, steps: JSON!): TaskType!

  """Mark a task as seen in the tasks view"""
  markTaskSeen(uid: Int!): TaskType!

  """Mark a conversation as seen by the current manager"""
  markConversationSeen(uid: String!): ConversationSummaryType!

  """Archive (soft-delete) a conversation"""
  deleteConversation(uid: String!): Boolean!

  """Manually create a property with optional units"""
  createProperty(input: CreatePropertyInput!): HouseType!

  """Update a property's name, address, or type"""
  updateProperty(input: UpdatePropertyInput!): HouseType!

  """
  Update the agent context for any entity (property, unit, tenant, vendor)
  """
  updateEntityContext(entityType: String!, entityId: String!, context: String!): Boolean!

  """Save private (per-account) notes for an entity"""
  saveEntityNote(entityType: String!, entityId: String!, content: String!): Boolean!

  """Create a routine"""
  createRoutine(name: String!, prompt: String!, schedule: String!, repeat: Int = null): RoutineType!

  """Update a routine"""
  updateRoutine(uid: Int!, name: String = null, prompt: String = null, schedule: String = null, enabled: Boolean = null): RoutineType!

  """Delete a routine"""
  deleteRoutine(uid: Int!): Boolean!

  """Run a routine immediately and return its output"""
  runRoutine(uid: Int!): RoutineType!

  """Simulate a routine — dry run that returns what the agent would do"""
  simulateRoutine(uid: Int!): String!

  """Delete a property and all its units/leases (cascade)"""
  deleteProperty(uid: String!): Boolean!

  """Set confirmed_at on a document"""
  confirmDocument(documentId: String!): Boolean!

  """Attach a new lease to an existing tenant on an existing unit"""
  addLeaseForTenant(input: AddLeaseForTenantInput!): TenantType!

  """Create a tenant and attach a lease to an existing unit"""
  createTenantWithLease(input: CreateTenantWithLeaseInput!): TenantType!

  """Assign a vendor to a task"""
  assignVendorToTask(taskId: Int!, vendorId: String!): TaskType!

  """Create a new vendor contact"""
  createVendor(input: CreateVendorInput!): VendorType!

  """Update an existing vendor contact"""
  updateVendor(input: UpdateVendorInput!): VendorType!

  """Delete a vendor contact"""
  deleteVendor(uid: String!): Boolean!

  """Act on a suggestion (accept, reject, approve draft, etc.)"""
  actOnSuggestion(uid: Int!, action: String!, editedBody: String = null): SuggestionType!

  """Spawn a Task from an existing conversation, linking lineage"""
  spawnTask(input: SpawnTaskInput!): TaskType!

  """
  Agent-drafted reply for a conversation in an external chat tool, viewed via the chrome extension. When ``externalThreadId`` is provided the thread is mirrored into rentmate as a read-only conversation so the AgentRun is groupable in DevTools and re-clicking ``Suggest`` doesn't duplicate messages.
  """
  suggestReply(input: SuggestReplyInput!): SuggestReplyResult!
}

input NewTenantForLeaseInput {
  firstName: String!
  lastName: String!
  email: String = null
  phone: String = null
}

type Query {
  """Return the current authenticated user"""
  me: UserType!

  """Returns a single document by ID"""
  document(uid: String!): DocumentType

  """Returns all routines"""
  routines(enabled: Boolean = null): [RoutineType!]!

  """Returns a single routine by ID"""
  routine(uid: Int!): RoutineType

  """Get private (per-account) notes for an entity"""
  entityNote(entityType: String!, entityId: String!): String

  """Returns all properties with their tenants and leases"""
  houses: [HouseType!]!

  """Returns all tenants with their leases and properties"""
  tenants: [TenantType!]!

  """Returns tasks. Filters: category, status list, source"""
  tasks(category: TaskCategory = null, status: [TaskStatus!] = null, source: TaskSource = null): [TaskType!]!

  """Returns a single task by uid, including its full message thread"""
  task(uid: Int!): TaskType

  """Returns all leases with nested tenant and property"""
  leases: [LeaseType!]!

  """Returns messages for a conversation by uid"""
  conversationMessages(uid: String!): [ChatMessageType!]!

  """Returns metadata for a single conversation (task link, participants)."""
  conversation(uid: String!): ConversationSummaryType

  """Returns all vendors"""
  vendors: [VendorType!]!

  """Returns the list of valid vendor type labels"""
  vendorTypes: [String!]!

  """Returns suggestions, optionally filtered by status and/or document"""
  suggestions(status: SuggestionStatus = null, documentId: String = null, limit: Int! = 50): [SuggestionType!]!

  """Returns conversations by type (tenant/vendor/user_ai/task_ai)"""
  conversations(conversationType: ConversationType!, limit: Int! = 50, offset: Int! = 0): [ConversationSummaryType!]!

  """Fuzzy-match tenants by name / email / phone. Top 3 ranked."""
  searchTenants(query: String!): [TenantSearchResult!]!
}

