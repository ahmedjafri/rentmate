fragment TaskMessageFields on ChatMessageType {
  uid
  body
  messageType
  senderName
  senderType
  isAi
  isSystem
  draftReply
  approvalStatus
  relatedTaskIds
  suggestionId
  actionCard {
    kind
    title
    summary
    fields {
      label
      value
    }
    links {
      label
      entityType
      entityId
      propertyId
    }
    units {
      uid
      label
      propertyId
    }
  }
  sentAt
}

fragment TaskFields on TaskType {
  uid
  taskNumber
  title
  taskStatus
  taskMode
  source
  category
  urgency
  priority
  confidential
  lastMessageAt
  propertyId
  unitId
  createdAt
  tenantName
  unitLabel
  aiTriageSuggestion
  vendorAssigned
  requireVendorType
  assignedVendorId
  assignedVendorName
  aiConversationId
  parentConversationId
  externalConversationIds
  steps
  goal
  suggestionOptions
  lastReviewedAt
  lastReviewStatus
  lastReviewSummary
  lastReviewNextStep
  unreadCount
  linkedConversations {
    uid
    label
    conversationType
    lastMessageAt
    messageCount
    unreadCount
    participants {
      name
      participantType
      entityId
      portalUrl
    }
  }
  messages {
    ...TaskMessageFields
  }
}

query Houses {
  houses {
    uid
    name
    address
    propertyType
    source
    units
    occupiedUnits
    monthlyRevenue
    context
    unitList {
      uid
      label
      isOccupied
      context
    }
    tenants {
      uid
      name
    }
    leases {
      uid
      startDate
      endDate
      rentAmount
      tenant {
        uid
        name
      }
    }
  }
}

query Tenants {
  tenants {
    uid
    name
    email
    unitLabel
    leaseEndDate
    rentAmount
    paymentStatus
    isActive
    context
    portalUrl
    extraProperties {
      key
      value
    }
    rents {
      uid
      name
      address
    }
    leases {
      uid
      rentAmount
      startDate
      endDate
    }
  }
}

query Tasks($category: TaskCategory, $status: [TaskStatus!], $source: TaskSource) {
  tasks(category: $category, status: $status, source: $source) {
    ...TaskFields
  }
}

query Task($uid: Int!) {
  task(uid: $uid) {
    ...TaskFields
  }
}

query Suggestions($status: SuggestionStatus) {
  suggestions(status: $status) {
    uid
    title
    body
    category
    urgency
    status
    source
    automationKey
    options
    actionTaken
    propertyId
    unitId
    taskId
    vendorName
    propertyName
    targetConversationId
    targetConversationType
    draftMessage
    createdAt
    messages {
      uid
      body
      messageType
      senderName
      isAi
      isSystem
      sentAt
      draftReply
      approvalStatus
    }
  }
}

query ConversationMessages($uid: String!) {
  conversationMessages(uid: $uid) {
    ...TaskMessageFields
  }
}

query GetConversation($uid: String!) {
  conversation(uid: $uid) {
    uid
    conversationType
    title
    taskId
    taskTitle
    participantLabel
  }
}

query Vendors {
  vendors {
    uid
    name
    company
    vendorType
    phone
    email
    notes
    context
    portalUrl
    createdAt
  }
}

query VendorTypes {
  vendorTypes
}

query EntityNote($entityType: String!, $entityId: String!) {
  entityNote(entityType: $entityType, entityId: $entityId)
}

query GetDocument($uid: String!) {
  document(uid: $uid) {
    uid
    filename
    documentType
    status
    progress
    extractedData
    extractionMeta
    context
    rawText
    errorMessage
    createdAt
    processedAt
  }
}

query GetConversations($conversationType: ConversationType!, $limit: Int) {
  conversations(conversationType: $conversationType, limit: $limit) {
    uid
    conversationType
    title
    lastMessageAt
    updatedAt
    lastMessageBody
    lastMessageSenderName
    propertyName
    participantCount
    unreadCount
    participantLabel
    taskId
    taskTitle
  }
}

query Routines {
  routines {
    uid
    name
    prompt
    schedule
    scheduleDisplay
    enabled
    state
    repeat
    completedCount
    nextRunAt
    lastRunAt
    lastStatus
    lastOutput
    createdAt
  }
}

query Routine($uid: Int!) {
  routine(uid: $uid) {
    uid
    name
    prompt
    schedule
    scheduleDisplay
    isDefault
    enabled
    state
    repeat
    completedCount
    nextRunAt
    lastRunAt
    lastStatus
    lastOutput
    simulatedAt
    createdAt
  }
}

query Me {
  me {
    uid
    username
  }
}

mutation Login($input: LoginInput!) {
  login(input: $input) {
    token
    user {
      uid
      username
    }
  }
}

mutation CreateProperty($input: CreatePropertyInput!) {
  createProperty(input: $input) {
    uid
    name
    address
    propertyType
    source
    units
    occupiedUnits
    monthlyRevenue
    unitList {
      uid
      label
      isOccupied
    }
  }
}

mutation UpdateProperty($input: UpdatePropertyInput!) {
  updateProperty(input: $input) {
    uid
    name
    address
    propertyType
  }
}

mutation DeleteProperty($uid: String!) {
  deleteProperty(uid: $uid)
}

mutation AddLeaseForTenant($input: AddLeaseForTenantInput!) {
  addLeaseForTenant(input: $input) {
    uid
    name
    email
    unitLabel
    leaseEndDate
    rentAmount
    paymentStatus
    isActive
  }
}

mutation CreateTenantWithLease($input: CreateTenantWithLeaseInput!) {
  createTenantWithLease(input: $input) {
    uid
    name
    email
    unitLabel
    leaseEndDate
    rentAmount
    paymentStatus
    isActive
  }
}

mutation DeleteTenant($uid: String!) {
  deleteTenant(uid: $uid)
}

mutation CreateTask($input: CreateTaskInput!) {
  createTask(input: $input) {
    uid
    title
    taskStatus
    taskMode
    category
    urgency
    source
    propertyId
    unitId
    aiConversationId
    createdAt
  }
}

mutation UpdateTask($input: UpdateTaskInput!) {
  updateTask(input: $input) {
    uid
    category
    taskStatus
    taskMode
    urgency
  }
}

mutation UpdateTaskStatus($uid: Int!, $status: TaskStatus!) {
  updateTaskStatus(uid: $uid, status: $status) {
    uid
    taskStatus
  }
}

mutation UpdateTaskGoal($uid: Int!, $goal: String!) {
  updateTaskGoal(uid: $uid, goal: $goal) {
    uid
    goal
  }
}

mutation MarkTaskSeen($uid: Int!) {
  markTaskSeen(uid: $uid) {
    uid
    unreadCount
  }
}

mutation MarkConversationSeen($uid: String!) {
  markConversationSeen(uid: $uid) {
    uid
    unreadCount
  }
}

mutation DeleteTask($uid: Int!) {
  deleteTask(uid: $uid)
}

mutation AssignVendorToTask($taskId: Int!, $vendorId: String!) {
  assignVendorToTask(taskId: $taskId, vendorId: $vendorId) {
    uid
    assignedVendorId
    assignedVendorName
  }
}

mutation ActOnSuggestion($uid: Int!, $action: String!, $editedBody: String) {
  actOnSuggestion(uid: $uid, action: $action, editedBody: $editedBody) {
    uid
    status
    actionTaken
    taskId
  }
}

mutation SendMessage($input: SendMessageInput!) {
  sendMessage(input: $input) {
    uid
    body
    messageType
    senderName
    senderType
    isAi
    isSystem
    draftReply
    approvalStatus
    suggestionId
    actionCard {
      kind
      title
      summary
      fields {
        label
        value
      }
      links {
        label
        entityType
        entityId
        propertyId
      }
      units {
        uid
        label
        propertyId
      }
    }
    sentAt
  }
}

mutation SendSms($vendorId: String!, $body: String!, $taskId: Int) {
  sendSms(vendorId: $vendorId, body: $body, taskId: $taskId) {
    uid
    body
    senderName
    sentAt
  }
}

mutation DeleteConversation($uid: String!) {
  deleteConversation(uid: $uid)
}

mutation CreateVendor($input: CreateVendorInput!) {
  createVendor(input: $input) {
    uid
    name
    company
    vendorType
    phone
    email
    notes
    portalUrl
  }
}

mutation UpdateVendor($input: UpdateVendorInput!) {
  updateVendor(input: $input) {
    uid
    name
    company
    vendorType
    phone
    email
    notes
    portalUrl
  }
}

mutation DeleteVendor($uid: String!) {
  deleteVendor(uid: $uid)
}

mutation UpdateEntityContext($entityType: String!, $entityId: String!, $context: String!) {
  updateEntityContext(entityType: $entityType, entityId: $entityId, context: $context)
}

mutation SaveEntityNote($entityType: String!, $entityId: String!, $content: String!) {
  saveEntityNote(entityType: $entityType, entityId: $entityId, content: $content)
}

mutation CreateRoutine($name: String!, $prompt: String!, $schedule: String!, $repeat: Int) {
  createRoutine(name: $name, prompt: $prompt, schedule: $schedule, repeat: $repeat) {
    uid
  }
}

mutation UpdateRoutine($uid: Int!, $name: String, $prompt: String, $schedule: String, $enabled: Boolean) {
  updateRoutine(uid: $uid, name: $name, prompt: $prompt, schedule: $schedule, enabled: $enabled) {
    uid
  }
}

mutation DeleteRoutine($uid: Int!) {
  deleteRoutine(uid: $uid)
}

mutation RunRoutine($uid: Int!) {
  runRoutine(uid: $uid) {
    uid
    lastStatus
    lastOutput
    lastRunAt
  }
}
