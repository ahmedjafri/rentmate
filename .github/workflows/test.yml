name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      llm_changed: ${{ steps.filter.outputs.llm }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect llm changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            llm:
              - 'llm/**'

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Ensure pytest-xdist is available
        run: poetry run python -m pip install pytest-xdist

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci --prefix www/rentmate-ui --no-audit --no-fund

      - name: Check migrations up to date
        run: npm run test:migrations

      - name: Run tests
        run: poetry run pytest --tb=short -q

  evals:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.llm_changed == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Ensure pytest-xdist is available
        run: poetry run python -m pip install pytest-xdist

      - name: Run evals
        env:
          # Evals run against qwen-flash via OpenRouter. Model + base URL are
          # non-sensitive and hardcoded here; only the API key is a secret.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: qwen/qwen3.5-flash-02-23
          LLM_BASE_URL: https://openrouter.ai/api/v1
          EVAL_AGENT_TEMPERATURE: "0"
          RENTMATE_DISABLE_VECTOR_INDEX: "1"
        run: poetry run pytest evals/ -m eval --tb=short -n auto

  evals-skipped:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository || needs.changes.outputs.llm_changed != 'true') }}

    steps:
      - name: Explain eval skip
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Skipping evals for forked PRs because GitHub does not expose repository secrets to untrusted pull_request workflows."
          else
            echo "Skipping evals because this PR does not change files under llm/."
          fi

  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install smoke test (Docker)
        run: bash tests/test-install.sh
