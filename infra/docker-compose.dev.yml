name: rentmate-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rentmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentmate"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    user: "${DOCKER_USER}"
    command: ["python", "main.py", "--host", "0.0.0.0", "--port", "8002", "--reload", "--log-level", "debug"]
    ports:
      - "8002:8002"
    working_dir: /app
    volumes:
      - ../:/app
      - ../data:/app/data
    environment:
      HOME: /app/data/home
      RENTMATE_ENV: development
      RENTMATE_DB_URI: postgresql+psycopg2://postgres:postgres@postgres:5432/rentmate
      RENTMATE_DEPLOYMENT_MODE: single-machine
      # Make seeded tenants & vendors auto-reply to manager messages so
      # the dev portfolio behaves like a live one. See demo/simulator.py.
      RENTMATE_DEMO_SIMULATOR: "1"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "8080:8080"
    working_dir: /app/www/rentmate-ui
    volumes:
      - ../www/rentmate-ui:/app/www/rentmate-ui
      - rentmate_web_node_modules:/app/www/rentmate-ui/node_modules
    environment:
      VITE_BACKEND_URL: http://api:8002
    depends_on:
      - api

volumes:
  rentmate_web_node_modules:
